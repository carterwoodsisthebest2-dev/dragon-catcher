<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Catcher - 2D Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth-container" class="container">
    <div class="auth-form">
      <h1>🐉 Dragon Catcher</h1>
      <div id="login-form">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>No account? <a href="#" onclick="toggleForm(event)">Register</a></p>
      </div>
      <div id="register-form" style="display:none;">
        <h2>Register</h2>
        <input type="text" id="register-username" placeholder="Username">
        <input type="email" id="register-email" placeholder="Email">
        <input type="password" id="register-password" placeholder="Password">
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="#" onclick="toggleForm(event)">Login</a></p>
      </div>
    </div>
  </div>

  <div id="game-container" style="display:none;" class="container">
    <div id="game-canvas-wrapper">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="ui-panel">
      <div id="player-stats">
        <h3>Player Stats</h3>
        <p>Level: <span id="player-level">1</span></p>
        <p>Experience: <span id="player-exp">0</span></p>
        <p>Money: <span id="player-money">1000</span></p>
      </div>
      <div id="team-panel">
        <h3>Team (0/6)</h3>
        <div id="team-list"></div>
      </div>
      <div id="dex-panel">
        <h3>Pokedex</h3>
        <p>Caught: <span id="caught-count">0</span>/200</p>
        <button onclick="openPokedex()">View Pokedex</button>
      </div>
    </div>
  </div>

  <div id="pokedex-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closePokedex()">&times;</span>
      <h2>Pokedex</h2>
      <div id="pokedex-search">
        <input type="text" id="pokedex-filter" placeholder="Search dragons..." onkeyup="filterPokedex()">
      </div>
      <div id="pokedex-list"></div>
    </div>
  </div>

  <script src="https://socket.io/4.5.4/socket.io.min.js"></script>
  <script src="dragonData.js"></script>
  <script src="game.js"></script>
</body>
</html>
